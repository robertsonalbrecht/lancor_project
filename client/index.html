<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lancor Search OS</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>

  <!-- ── Top Navigation Bar ──────────────────────────────────────────────── -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="navbar-left">
      <button class="nav-icon-btn" title="Home" aria-label="Home" onclick="navGoHome()">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L10 3l7 7.5"/><path d="M5 9v8h4v-4h2v4h4V9"/></svg>
      </button>
      <button class="nav-icon-btn" title="Back" aria-label="Back" onclick="navGoBack()">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 4l-6 6 6 6"/></svg>
      </button>
      <button class="nav-icon-btn" title="Forward" aria-label="Forward" onclick="navGoForward()">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4l6 6-6 6"/></svg>
      </button>
      <span class="wordmark" style="margin-left:8px">LANCOR</span>
      <span class="nav-subtitle">Search OS</span>
    </div>

    <ul class="nav-links" role="menubar">
      <li role="none">
        <a href="#" class="nav-link" role="menuitem" data-module="playbooks"
           onclick="navigateTo('playbooks'); return false;">
          Sector Playbooks
        </a>
      </li>
      <li role="none">
        <a href="#" class="nav-link" role="menuitem" data-module="searches"
           onclick="navigateTo('searches'); return false;">
          Active Searches
        </a>
      </li>
      <li role="none">
        <a href="#" class="nav-link" role="menuitem" data-module="companies"
           onclick="navigateTo('companies'); return false;">
          Company Pool
        </a>
      </li>
      <li role="none">
        <a href="#" class="nav-link" role="menuitem" data-module="pool"
           onclick="navigateTo('pool'); return false;">
          Candidate Pool
        </a>
      </li>
      <li role="none">
        <a href="#" class="nav-link" role="menuitem" data-module="templates"
           onclick="navigateTo('templates'); return false;">
          Search Templates
        </a>
      </li>
    </ul>

    <div class="navbar-right">
      <button class="icon-btn" title="Settings" aria-label="Settings"
              onclick="navigateTo('settings')">&#9881;</button>
    </div>
  </nav>

  <!-- ── Main Content Area ───────────────────────────────────────────────── -->
  <main id="app-content" role="main">
    <!-- Populated by app.js on load -->
  </main>

  <!-- ── JavaScript Modules ──────────────────────────────────────────────── -->
  <script src="/js/app.js?v=3"></script>
  <script src="/js/playbooks.js?v=3"></script>
  <script src="/js/searches.js?v=3"></script>
  <script src="/js/coverage.js?v=3"></script>
  <script src="/js/companies.js?v=3"></script>
  <script src="/js/pool.js?v=3"></script>
  <script src="/js/templates.js?v=3"></script>
  <script src="/js/dashboard.js?v=3"></script>

</body>
</html>
